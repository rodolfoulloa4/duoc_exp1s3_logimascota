services:
  logimascota:
    build:
      context: .
      dockerfile: Dockerfile
    image: logimascota:latest
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      ORACLE_WALLET_PATH: /app/wallet
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:oracle:thin:@dba001_tp?TNS_ADMIN=/app/wallet}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-FULLSTACK}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-Fullst4ck......}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      LOG_FILE_NAME: /app/logs/application.log
    volumes:
      - ./logs:/app/logs